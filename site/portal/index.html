<style>
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  /* overflow-x: clip kills horizontal scroll from decorative absolute layers
     (.rf-pitch-circle 540px etc.) on mobile WITHOUT breaking position:sticky. */
  html, body { overflow-x: clip; }
  body { margin: 0; max-width: 100%; }
  a { -webkit-tap-highlight-color: transparent; }
  ::selection { background: var(--accent-soft); }
  #root { min-height: 100vh; }

  /* a11y: visible keyboard focus ring (replaces weak default outline:auto;
     mouse focus stays clean via :focus:not(:focus-visible)) */
  :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 3px; }
  :focus:not(:focus-visible) { outline: none; }

  /* scroll reveal — only activates once rAF confirms the timeline runs (body.js-reveal).
     Default state is fully visible, so content never gets stuck hidden. */
  .reveal { opacity: 1; }
  body.js-reveal .reveal { opacity: 0; transform: translateY(16px); transition: opacity 0.55s var(--ease-out), transform 0.55s var(--ease-out); }
  body.js-reveal .reveal.in { opacity: 1; transform: none; }
  @media (prefers-reduced-motion: reduce) { body.js-reveal .reveal { opacity: 1; transform: none; transition: none; } }

  /* responsive collapse */
  @media (max-width: 880px) {
    .hero-grid, .board-grid, .bt-grid, .xg-grid, .foot-grid, .match-grid, .vb-grid { grid-template-columns: 1fr !important; }
    .pipe-grid { grid-template-columns: 1fr 1fr !important; }
    .mod-grid, .bound-grid { grid-template-columns: 1fr !important; }
    .nav-links { display: none !important; }
    .desktop-utility { display: none !important; }
    body { padding-bottom: 78px; }
    .mobile-tabbar { display: flex !important; }
  }
  @media (max-width: 560px) {
    .pipe-grid { grid-template-columns: 1fr !important; }
  }

  /* bracket tree */
  .bkt-col { display: flex; flex-direction: column; min-width: 176px; flex: 1; }
  .bkt-col-body { flex: 1; display: flex; flex-direction: column; justify-content: space-around; gap: 10px; }
  .bkt-match { position: relative; }
  .bkt-clickable { transition: border-color var(--dur-fast) var(--ease), box-shadow var(--dur-fast) var(--ease); }
  .bkt-clickable:hover { border-color: var(--ink) !important; box-shadow: var(--shadow-2) !important; }

  /* football logo roll */
  @keyframes rf-roll { from { transform: rotate(0); } to { transform: rotate(360deg); } }
  .rf-spin { animation: rf-roll 9s linear infinite; transform-origin: 50% 50%; }
  .rf-ball { transition: transform 0.7s var(--ease-out); transform-origin: 50% 50%; }
  .rf-brand:hover .rf-ball { transform: rotate(360deg); }
  @media (prefers-reduced-motion: reduce) { .rf-spin { animation: none; } }
  .bkt-grid .bkt-col:not(:last-child) .bkt-match::after {
    content: ''; position: absolute; top: 50%; right: calc(-1 * var(--s-5) / 2 - 1px);
    width: calc(var(--s-5) / 2); height: 1px; background: var(--hairline-strong);
  }

  /* embedded sponsor (redhorsehk.ai) — inherit ink, not default link-blue (#0000EE clashed with warm palette) */
  .rh-ad, .rh-ad:visited { color: var(--ink); text-decoration: none; }
  .rh-ad:hover { border-color: var(--accent) !important; box-shadow: var(--shadow-2); }
  .rh-ad:hover .rh-cta { filter: brightness(0.94); }

  /* responsive type: H1 hero scales down on phones (was fixed 52px → overflowed/oversized) */
  @media (max-width: 640px) {
    h1 { font-size: clamp(30px, 8.2vw, 44px) !important; line-height: 1.12 !important; }
  }
  /* touch targets + even distribution: 44px min & equal-width tabs across the bar
     (the inline repeat(6,1fr) grid is inert under display:flex, so tabs were
     left-bunched with dead space on the right; flex:1 spreads all 7 evenly) */
  @media (max-width: 880px) {
    .mobile-tabbar button, .mobile-tabbar a { min-height: 44px; flex: 1 1 0; min-width: 0; }
  }
  @media (max-width: 560px) {
    .rh-banner { flex-direction: column !important; align-items: flex-start !important; gap: 14px !important; }
    .rh-banner .rh-cta { width: 100%; text-align: center; }
  }
  .mobile-tabbar { display: none; scrollbar-width: none; }
  .mobile-tabbar::-webkit-scrollbar { display: none; }
