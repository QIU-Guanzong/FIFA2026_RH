name: CI

on:
  push:
    branches: ["main", "codex/**"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,features]"

      - name: Lint
        run: ruff check src tests

      - name: Test with coverage
        run: pytest --cov=wcpredict --cov-report=term-missing --cov-fail-under=85

      - name: Audit dependencies
        # Keep the gate visible even if upstream advisories are noisy for now.
        continue-on-error: true
        run: pip-audit --progress-spinner off
